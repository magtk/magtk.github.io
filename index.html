<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>magtk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;1,9..144,200;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1814;
    --paper: #f5f2eb;
    --muted: #8a8478;
    --accent: #3d5a4a;
    --rule: #c8c2b4;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #e8e4da;
      --paper: #141210;
      --muted: #706c62;
      --accent: #7aab8e;
      --rule: #2e2c28;
    }
  }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--mono);
  }

  body {
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .stage {
    width: 100%;
    max-width: 680px;
    position: relative;
  }

  .header-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 3rem;
  }

  .header-rule::before,
  .header-rule::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--rule);
  }

  .coord {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    font-weight: 300;
  }

  .name-block {
    margin-bottom: 1.5rem;
    position: relative;
  }

  .name-main {
    font-family: var(--serif);
    font-size: clamp(3.5rem, 12vw, 6.5rem);
    font-weight: 200;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--ink);
    display: block;
  }

  .name-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.18em;
    font-weight: 300;
    margin-top: 0.75rem;
    display: block;
  }

  .glyph-float {
    position: absolute;
    right: 0;
    top: 0.5rem;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--rule);
    letter-spacing: 0.1em;
    line-height: 1.8;
    text-align: right;
    font-weight: 300;
  }

  .tagline-block {
    border-left: 1.5px solid var(--accent);
    padding-left: 1.25rem;
    margin: 2rem 0 2.5rem;
  }

  .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 200;
    font-size: clamp(1rem, 3vw, 1.25rem);
    line-height: 1.5;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .tagline em {
    font-style: normal;
    color: var(--accent);
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
  }

  .meta-item {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    font-weight: 300;
    padding-right: 1.5rem;
    position: relative;
  }

  .meta-item + .meta-item::before {
    content: '·';
    position: absolute;
    left: 0.6rem;
    color: var(--rule);
  }

  .meta-item a {
    color: inherit;
    text-decoration: none;
  }

  .meta-item a:hover {
    color: var(--accent);
  }

  .status-bar {
    margin-top: 3rem;
    padding-top: 1.25rem;
    border-top: 0.5px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .status-left {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    font-weight: 300;
  }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: var(--accent);
    margin-left: 3px;
    vertical-align: -2px;
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .status-right {
    font-size: 10px;
    color: var(--rule);
    letter-spacing: 0.1em;
    font-weight: 300;
    font-family: var(--mono);
  }

  .scan-line {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 100%;
    background: repeating-linear-gradient(
      transparent,
      transparent 2px,
      rgba(0,0,0,0.012) 2px,
      rgba(0,0,0,0.012) 4px
    );
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="scan-line" aria-hidden="true"></div>
<main class="stage">
  <div class="header-rule">
    <span class="coord">48°21'N · 19°12'E</span>
  </div>

  <div class="name-block">
    <span class="name-main">magtk</span>
    <span class="name-sub">[ TECHNICAL PUBLISHING ACCOUNT ]</span>
    <div class="glyph-float" aria-hidden="true">
      0x6d 0x61 0x67<br>
      0x74 0x6b 0x00<br>
      init: ready<br>
      heap: clean
    </div>
  </div>

  <div class="tagline-block">
    <p class="tagline">
      A place where <em>ideas compile</em> —<br>
      tools, labs &amp; things worth publishing.
    </p>
  </div>

  <div class="meta-row">
    <span class="meta-item"><a href="https://github.com/magtk">GITHUB.COM/MAGTK</a></span>
    <span class="meta-item">LABS &amp; TOOLS</span>
    <span class="meta-item">OPEN SOURCE</span>
  </div>

  <div class="status-bar">
    <span class="status-left">READY<span class="cursor"></span></span>
    <span class="status-right">v1.0.0 · 2025</span>
  </div>
</main>
</body>
</html>
